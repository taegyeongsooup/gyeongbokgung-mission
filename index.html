<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>경복궁 미션투어 - 조선의 문을 열어라</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #d35400;
            --success-color: #27ae60;
            --bg-color: #f5f6fa;
            --card-bg: #ffffff;
            --text-color: #2f3640;
            --border-radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: var(--primary-color);
            color: white;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 10;
        }

        header h1 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 2px;
        }

        header p {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        .school-tag {
            font-size: 0.8rem;
            background-color: var(--accent-color);
            padding: 2px 8px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 5px;
        }

        /* 메인 레이아웃: 왼쪽 네비게이션 + 오른쪽 콘텐츠 */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* 왼쪽 미션 사이드바 */
        .sidebar {
            width: 80px;
            background-color: #e1e4eb;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 0;
            gap: 12px;
            overflow-y: auto;
            border-right: 1px solid #dcdde1;
        }

        .mission-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid #b2bec3;
            background-color: white;
            font-weight: bold;
            font-size: 1rem;
            color: #636e72;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            transition: all 0.2s ease;
        }

        .mission-btn.active {
            border-color: var(--accent-color);
            background-color: var(--accent-color);
            color: white;
            transform: scale(1.05);
            box-shadow: 0 4px 8px rgba(211, 84, 0, 0.3);
        }

        .mission-btn.completed {
            border-color: var(--success-color);
            background-color: white;
            color: var(--success-color);
        }

        .mission-btn.completed.active {
            background-color: var(--success-color);
            color: white;
        }

        .mission-btn .check-icon {
            position: absolute;
            bottom: -2px;
            right: -2px;
            background-color: var(--success-color);
            color: white;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            font-size: 10px;
            display: none;
            justify-content: center;
            align-items: center;
            border: 1px solid white;
        }

        .mission-btn.completed .check-icon {
            display: flex;
        }

        /* 오른쪽 미션 상세 콘텐츠 */
        .content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* 모둠 입력 카드 */
        .team-card {
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .team-card label {
            font-weight: bold;
            font-size: 0.9rem;
            white-space: nowrap;
        }

        .team-card select, .team-card input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        /* 미션 카드 */
        .mission-card {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex: 1;
            border-top: 4px solid var(--primary-color);
        }

        .mission-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #f1f2f6;
            padding-bottom: 10px;
        }

        .mission-title {
            font-size: 1.15rem;
            font-weight: bold;
            color: var(--primary-color);
        }

        .mission-status-badge {
            font-size: 0.8rem;
            padding: 3px 8px;
            border-radius: 12px;
            font-weight: bold;
        }

        .status-yet {
            background-color: #ffeaa7;
            color: #d35400;
        }

        .status-done {
            background-color: #badc58;
            color: #27ae60;
        }

        .mission-desc {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #57606f;
            background-color: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            border-left: 3px solid #ced6e0;
        }

        /* 미션 수행 폼 영역 */
        .action-area {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 10px;
        }

        /* 사진 찍기 스타일 */
        .camera-btn-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .camera-label {
            background-color: #0984e3;
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
            width: 100%;
            justify-content: center;
        }

        .camera-label:active {
            transform: scale(0.98);
        }

        .file-input {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            display: none;
        }

        /* 이미지 미리보기 */
        .preview-container {
            width: 100%;
            max-height: 200px;
            border-radius: 8px;
            overflow: hidden;
            border: 2px dashed #b2bec3;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f1f2f6;
        }

        .preview-img {
            max-width: 100%;
            max-height: 200px;
            object-fit: contain;
            display: none;
        }

        .preview-placeholder {
            color: #a4b0be;
            font-size: 0.85rem;
            text-align: center;
            padding: 20px;
        }

        /* 텍스트 정답 입력 */
        .text-input-wrapper {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .text-answer {
            width: 100%;
            padding: 12px;
            border: 1px solid #ced6e0;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
        }

        .text-answer:focus {
            border-color: var(--primary-color);
        }

        /* 제출 버튼 */
        .submit-btn {
            background-color: var(--success-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: var(--border-radius);
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(39, 174, 96, 0.2);
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .submit-btn:disabled {
            background-color: #b2bec3;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* 네비게이션 하단 컨트롤 */
        .nav-controls {
            display: flex;
            justify-content: space-between;
            margin-top: auto;
            padding-top: 10px;
        }

        .nav-btn {
            background-color: #747d8c;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
        }

        .nav-btn:disabled {
            background-color: #ced6e0;
            cursor: not-allowed;
        }

        /* 로딩 스피너 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 15px;
            color: white;
            z-index: 100;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 알림 모달 */
        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background-color: white;
            padding: 20px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            z-index: 101;
            display: none;
            width: 80%;
            max-width: 300px;
            text-align: center;
            flex-direction: column;
            gap: 15px;
        }

        .modal.show {
            display: flex;
            animation: pop 0.25s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            to { transform: translate(-50%, -50%) scale(1); }
        }

        .modal-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .modal-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.4);
            z-index: 100;
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>경복궁 미션투어</h1>
        <p>조선의 문을 열어라 🔑</p>
        <span class="school-tag">여선중학교</span>
    </header>

    <div class="main-container">
        <!-- 왼쪽 미션 선택 사이드바 -->
        <div class="sidebar" id="sidebar">
            <!-- 1~9 미션 버튼들이 JS에 의해 생성됩니다 -->
        </div>

        <!-- 오른쪽 미션 상세 보기 -->
        <div class="content">
            <!-- 모둠 입력 영역 -->
            <div class="team-card">
                <label for="team-select">우리 모둠:</label>
                <select id="class-select">
                    <option value="4반">4반</option>
                    <option value="5반">5반</option>
                    <option value="6반">6반</option>
                </select>
                <select id="team-select">
                    <option value="1모둠">1모둠</option>
                    <option value="2모둠">2모둠</option>
                    <option value="3모둠">3모둠</option>
                    <option value="4모둠">4모둠</option>
                    <option value="5모둠">5모둠</option>
                    <option value="6모둠">6모둠</option>
                </select>
            </div>

            <!-- 현재 미션 내용 -->
            <div class="mission-card" id="mission-card">
                <div class="mission-header">
                    <span class="mission-title" id="m-title">미션 1</span>
                    <span class="mission-status-badge status-yet" id="m-status">미수행</span>
                </div>
                
                <div class="mission-desc" id="m-desc">
                    설명이 들어갑니다.
                </div>

                <div class="action-area" id="action-area">
                    <!-- 미션 종류에 따라 동적으로 구성됨 -->
                </div>

                <button class="submit-btn" id="submit-btn" onclick="submitCurrentMission()">미션 완료 & 제출하기</button>

                <div class="nav-controls">
                    <button class="nav-btn" id="prev-btn" onclick="prevMission()">◀ 이전 미션</button>
                    <button class="nav-btn" id="next-btn" onclick="nextMission()">다음 미션 ▶</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 로딩화면 -->
    <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
        <p id="loading-text">미션 업로드 중... 잠시만 기다려주세요.</p>
    </div>

    <!-- 알림 모달 -->
    <div class="modal-bg" id="modal-bg"></div>
    <div class="modal" id="modal">
        <h3 id="modal-title">알림</h3>
        <p id="modal-msg">내용</p>
        <button class="modal-btn" onclick="closeModal()">확인</button>
    </div>

    <script>
        // ★★★ 선생님 설정 영역: 구글 앱스 스크립트(GAS) 웹앱 배포 URL을 여기에 입력하세요 ★★★
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwhuDLSWZ-zBzIgpR7gG1TQR-hSxedTZqmc_MK4d9LWaMHJwazcjeeMTRh_NGr6Vv-r/exec"; 

        // 미션 데이터 정의
        const missions = [
            {
                id: 1,
                title: "미션1: 광화문의 수호신을 찾아라!",
                desc: "광화문은 경복궁의 남쪽 문으로, 남쪽의 수호신인 '주작'이 그려져 있다고 해. 광화문을 지나며 천장을 올려다 보면 보이는 주작의 사진을 찍어 올려보자!",
                type: "photo"
            },
            {
                id: 2,
                title: "미션2: 영제교의 상상의 동물을 찾아라!",
                desc: "홍례문을 지나면 나오는 다리 영제교에는 '천록'이라는 상상의 동물이 조각되어 있어. 천록은 흉하고 사악한 것을 제거하고 보물을 지켜준다고 해. 천록의 사진을 찍어 올려보자!",
                type: "photo"
            },
            {
                id: 3,
                title: "미션3: 근정전에서 황제의 용을 찾아라!",
                desc: "경복궁의 가장 핵심 건물인 근정전은 국가 의식을 거행하고 외국의 사신을 맞이하는 중요한 건물이야. 근정전 천장을 올려다 보면 발톱을 일곱 개 가진 용이 있을 거야. 일곱 개의 발톱은 '황제'의 권위를 상징한다고 해. 천장에 있는 용의 사진을 찍어 올려보자!",
                type: "photo"
            },
            {
                id: 4,
                title: "미션4: 사정전 앞에서 조선의 시간을 찾아라!",
                desc: "임금이 집무를 보던 사정전 앞에는 조선시대의 해시계인 '이것'의 모형이 있어. 해시계의 이름을 찾아 써 보자! 설명 표지판에 나와 있을 거야.",
                type: "text",
                placeholder: "해시계의 이름(한글로 입력)"
            },
            {
                id: 5,
                title: "미션5: 강녕하셨습니까?",
                desc: "임금이 잠을 자고 생활하는 임금의 집이 바로 강녕전이야. '강녕'은 '편안함'을 의미하는 말이야. 강녕전 좌측에는 임금님의 전용 우물인 '어정'이 있어. 우물은 태극 문양을, 주변 테두리는 팔괘를 상징한다고 해. 우물의 사진을 찍어 올려보자!",
                type: "photo"
            },
            {
                id: 6,
                title: "미션6: 가장 큰 전통 건축물, 경회루의 수호신을 찾아라!",
                desc: "경회루는 왕과 신하들이 연회를 즐기고, 사신을 접대하던 누각이야. 대한민국에 현존하는 가장 큰 전통 목조 건축물이지. 경회루의 지붕 끝 부분을 자세히 보면 11개의 잡상이 줄지어 있는 것을 볼 수 있을 거야. 건축물의 격을 보여주는 것으로 궁궐 건물에만 허락되는 수호신이지. 경회루 잡상의 사진을 찍어 올려보자!",
                type: "photo"
            },
            {
                id: 7,
                title: "미션7: 왕비의 정원에 있는 조선의 굴뚝",
                desc: "조선 왕비의 거처인 교태전 뒤에는 작은 계단식 정원이 있어. 그 정원에 4개의 육각형 굴뚝이 있는데, 상징적인 의미를 갖는 여러 조각들이 새겨져 있지. 굴뚝에 새겨진 봉황과 박쥐는 무엇을 상징할까? 설명 표지판을 보면 찾을 수 있을걸?",
                type: "text",
                placeholder: "봉황과 박쥐가 상징하는 의미를 적어주세요."
            },
            {
                id: 8,
                title: "미션8: 아름다운 연못과 정자, 향원정",
                desc: "'향기가 멀리 간다'는 뜻을 가진 정자 향원정은 경복궁에서 가장 아름다운 풍경을 자랑하는 곳 중 하나야. 향원정을 배경으로 모둠원들과 사진을 찍어 올려보자!",
                type: "photo"
            },
            {
                id: 9,
                title: "미션9: 고종의 서재, 집옥재",
                desc: "집옥재는 비교적 최근에 만들어진 건축물로, 서재의 역할을 하던 건물이야. 이곳은 다른 건물들과 다르게 중국 청나라와 서양풍의 양식이 가미되어 색다른 느낌을 주는 건물이야. 집옥재의 좌우측 벽면이 벽돌로 된 것이 대표적인 특징이지. 건물의 우측에서 벽돌이 보이게 사진을 찍어 올려보자!",
                type: "photo"
            }
        ];

        let currentIdx = 0;
        let localAnswers = {}; // 브라우저 로컬 저장용 객체

        // 초기화
        window.onload = function() {
            // 로컬스토리지에서 기존 상태 복원
            if (localStorage.getItem("gbg_mission_answers")) {
                localAnswers = JSON.parse(localStorage.getItem("gbg_mission_answers"));
            }
            
            // 반/모둠 정보 복원
            if (localStorage.getItem("gbg_class")) {
                document.getElementById("class-select").value = localStorage.getItem("gbg_class");
            }
            if (localStorage.getItem("gbg_team")) {
                document.getElementById("team-select").value = localStorage.getItem("gbg_team");
            }

            // 반/모둠 변경 감지 저장
            document.getElementById("class-select").addEventListener("change", (e) => {
                localStorage.setItem("gbg_class", e.target.value);
            });
            document.getElementById("team-select").addEventListener("change", (e) => {
                localStorage.setItem("gbg_team", e.target.value);
            });

            buildSidebar();
            loadMission(0);
        };

        // 왼쪽 사이드바 버튼 생성
        function buildSidebar() {
            const sidebar = document.getElementById("sidebar");
            sidebar.innerHTML = "";
            missions.forEach((m, idx) => {
                const btn = document.createElement("button");
                btn.className = `mission-btn ${idx === currentIdx ? 'active' : ''}`;
                btn.id = `side-btn-${idx}`;
                btn.innerHTML = `${m.id}<span class="check-icon">✓</span>`;
                btn.onclick = () => loadMission(idx);
                
                // 완료 표시 적용
                if (localAnswers[m.id] && localAnswers[m.id].submitted) {
                    btn.classList.add("completed");
                }
                
                sidebar.appendChild(btn);
            });
        }

        // 미션 내용 렌더링
        function loadMission(idx) {
            currentIdx = idx;
            const mission = missions[idx];

            // 사이드바 액티브 갱신
            document.querySelectorAll(".mission-btn").forEach((btn, i) => {
                btn.classList.remove("active");
                if (i === idx) btn.classList.add("active");
            });

            // 타이틀 및 설명 설정
            document.getElementById("m-title").innerText = mission.title;
            document.getElementById("m-desc").innerText = mission.desc;

            // 상태 배지 표시
            const statusBadge = document.getElementById("m-status");
            const isCompleted = localAnswers[mission.id] && localAnswers[mission.id].submitted;
            if (isCompleted) {
                statusBadge.innerText = "제출완료";
                statusBadge.className = "mission-status-badge status-done";
                document.getElementById("submit-btn").innerText = "다시 제출하기";
            } else {
                statusBadge.innerText = "미수행";
                statusBadge.className = "mission-status-badge status-yet";
                document.getElementById("submit-btn").innerText = "미션 완료 & 제출하기";
            }

            // 액션 에리어 구성
            const actionArea = document.getElementById("action-area");
            actionArea.innerHTML = "";

            if (mission.type === "photo") {
                // 사진 촬영 인풋 영역
                actionArea.innerHTML = `
                    <div class="camera-btn-wrapper">
                        <label for="camera-file" class="camera-label">
                            📷 카메라로 사진 촬영 / 업로드
                        </label>
                        <input type="file" id="camera-file" class="file-input" accept="image/*" capture="environment" onchange="handleImageUpload(event)">
                    </div>
                    <div class="preview-container">
                        <img id="image-preview" class="preview-img" src="">
                        <div id="preview-placeholder" class="preview-placeholder">촬영한 사진 미리보기가 여기에 표시됩니다.</div>
                    </div>
                `;

                // 기존 저장 데이터 복원
                if (localAnswers[mission.id] && localAnswers[mission.id].data) {
                    const preview = document.getElementById("image-preview");
                    const placeholder = document.getElementById("preview-placeholder");
                    preview.src = localAnswers[mission.id].data;
                    preview.style.display = "block";
                    placeholder.style.display = "none";
                }
            } else if (mission.type === "text") {
                // 텍스트 답안 입력 영역
                actionArea.innerHTML = `
                    <div class="text-input-wrapper">
                        <input type="text" id="text-answer-input" class="text-answer" placeholder="${mission.placeholder}" oninput="handleTextChange(event)">
                    </div>
                `;

                // 기존 데이터 복원
                if (localAnswers[mission.id] && localAnswers[mission.id].data) {
                    document.getElementById("text-answer-input").value = localAnswers[mission.id].data;
                }
            }

            // 이전/다음 버튼 비활성화 조율
            document.getElementById("prev-btn").disabled = (idx === 0);
            document.getElementById("next-btn").disabled = (idx === missions.length - 1);
        }

        // 이미지 파일 처리 및 압축
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            showLoading("이미지 압축 및 처리 중입니다...");

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    // 이미지 리사이징 (최대 해상도 800px로 제한하여 GAS 용량 초과 회피)
                    const MAX_WIDTH = 800;
                    const MAX_HEIGHT = 800;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                    } else {
                        if (height > MAX_HEIGHT) {
                            width *= MAX_HEIGHT / height;
                            height = MAX_HEIGHT;
                        }
                    }

                    const canvas = document.createElement("canvas");
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext("2d");
                    ctx.drawImage(img, 0, 0, width, height);

                    // JPEG 75% 압축률 적용으로 가볍게 변환
                    const compressedBase64 = canvas.toDataURL("image/jpeg", 0.75);

                    // UI 미리보기 반영
                    document.getElementById("image-preview").src = compressedBase64;
                    document.getElementById("image-preview").style.display = "block";
                    document.getElementById("preview-placeholder").style.display = "none";

                    // 임시 데이터 상태 저장
                    const currentMission = missions[currentIdx];
                    if (!localAnswers[currentMission.id]) {
                        localAnswers[currentMission.id] = {};
                    }
                    localAnswers[currentMission.id].data = compressedBase64;
                    saveToLocalStorage();
                    hideLoading();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // 텍스트 변동 핸들러
        function handleTextChange(event) {
            const currentMission = missions[currentIdx];
            if (!localAnswers[currentMission.id]) {
                localAnswers[currentMission.id] = {};
            }
            localAnswers[currentMission.id].data = event.target.value;
            saveToLocalStorage();
        }

        // 로컬 스토리지 데이터 동기화
        function saveToLocalStorage() {
            localStorage.setItem("gbg_mission_answers", JSON.stringify(localAnswers));
        }

        // 미션 데이터 최종 서버 제출
        function submitCurrentMission() {
            const currentMission = missions[currentIdx];
            const answer = localAnswers[currentMission.id];

            if (!answer || !answer.data || answer.data.toString().trim() === "") {
                showAlert("입력 부족", "사진을 찍거나 정답을 입력해주세요!");
                return;
            }

            const className = document.getElementById("class-select").value;
            const teamName = document.getElementById("team-select").value;

            showLoading("구글 스프레드시트로 미션 전송 중...");

            // 전송 데이터 객체
            const payload = {
                className: className,
                teamName: teamName,
                missionId: currentMission.id,
                missionTitle: currentMission.title,
                type: currentMission.type,
                data: answer.data // Base64 이미지 스트링 혹은 텍스트
            };

            if (GAS_URL === "YOUR_GOOGLE_APPS_SCRIPT_WEBAPP_URL_HERE") {
                // 테스트용 로컬 시뮬레이션
                setTimeout(() => {
                    hideLoading();
                    answer.submitted = true;
                    saveToLocalStorage();
                    buildSidebar();
                    loadMission(currentIdx);
                    showAlert("제출 완료!", "연동 주소(GAS_URL)가 지정되지 않았지만, 기기에 정상 저장되었습니다. (테스트 성공)");
                }, 1000);
                return;
            }

            fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors", // 브라우저 CORS 문제 우회
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            })
            .then(() => {
                // no-cors 모드는 응답 헤더를 읽지 못하나 정상적으로 전송은 완료됨
                hideLoading();
                answer.submitted = true;
                saveToLocalStorage();
                buildSidebar();
                loadMission(currentIdx);
                showAlert("제출 완료", `${currentMission.id}번 미션이 실시간 현황판에 안전하게 기록되었습니다!`);
            })
            .catch(error => {
                hideLoading();
                console.error("전송 에러:", error);
                showAlert("연결 실패", "인터넷이 불안정하여 전송에 실패했습니다. 다시 시도해주세요!");
            });
        }

        // 네비게이션 컨트롤 기능
        function prevMission() {
            if (currentIdx > 0) loadMission(currentIdx - 1);
        }

        function nextMission() {
            if (currentIdx < missions.length - 1) loadMission(currentIdx + 1);
        }

        // 로딩 화면 핸들러
        function showLoading(text) {
            document.getElementById("loading-text").innerText = text;
            document.getElementById("loading").style.display = "flex";
        }

        function hideLoading() {
            document.getElementById("loading").style.display = "none";
        }

        // 알림 제어
        function showAlert(title, msg) {
            document.getElementById("modal-title").innerText = title;
            document.getElementById("modal-msg").innerText = msg;
            document.getElementById("modal-bg").style.display = "block";
            document.getElementById("modal").classList.add("show");
        }

        function closeModal() {
            document.getElementById("modal-bg").style.display = "none";
            document.getElementById("modal").classList.remove("show");
        }
    </script>
</body>
</html>
